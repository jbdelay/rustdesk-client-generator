services:
  rustdesk-client-generator:
    # use bryangerlach/rdgen:latest for the latest build
    #build: .
    image: jbdelay/rustdesk-client-generator:latest
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      GHUSER: ${GHUSER}
      GHBEARER: ${GHBEARER}
      GENURL: ${GENURL}
      GHBRANCH: "master"
      ZIP_PASSWORD: ${ZIP_PASSWORD}
      PROTOCOL: "https"
      REPONAME: ${REPONAME}
      SH_SECRET: "delayservices"
      DEBUG: "True"
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
    volumes:
      - rdgen-exe:/app/output
      - rdgen-png:/app/png
      - rdgen-data:/app/data
volumes:
  rdgen-exe:
  rdgen-png:
  rdgen-data:
